<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兰花记账软件 - 首页</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="frame">
      <div class="topbar">
        <div class="mobile-statusbar">
          <span>9:41</span>
          <div class="status-icons">
            <span>5G</span>
            <span>88%</span>
          </div>
        </div>
        <div class="brand">
          <div class="brand-mark">兰</div>
          <div>
            <h1>兰花记账软件</h1>
            <p>今日记账控制台</p>
          </div>
        </div>
        <div class="topbar-meta">
          <p class="meta-line" id="dashboard-date-label"></p>
          <p class="meta-line" id="dashboard-count-label"></p>
        </div>
      </div>
      <div class="app-body">
        <main class="content">
          <section class="hero-card">
            <div class="eyebrow">今日收支总览</div>
            <div class="kpi-value" id="today-profit">¥ 0</div>
            <div class="kpi-label" id="today-profit-detail">今日利润 = 销售 ¥ 0 - 支出 ¥ 0</div>
            <div class="summary-inline" id="today-summary-inline"></div>
          </section>

          <section class="action-grid">
            <a class="quick-action primary" href="sales.html">
              <div class="action-title">记销售</div>
              <div class="action-desc">四等级价格与数量快速录入</div>
            </a>
            <a class="quick-action" href="expenses.html">
              <div class="action-title">记支出</div>
              <div class="action-desc">工人、材料、幼苗费用登记</div>
            </a>
          </section>

          <section class="mobile-shortcuts" id="dashboard-shortcuts"></section>

          <h2 class="section-title">常用查看</h2>
          <p class="section-subtitle">点击任意区块跳转详情页。</p>

          <section class="quick-grid" id="dashboard-quick-grid"></section>

          <section class="panel trend-panel">
            <h3>本周简版趋势</h3>
            <svg class="trend-svg" viewBox="0 0 360 132" xmlns="http://www.w3.org/2000/svg">
              <line x1="26" y1="18" x2="26" y2="108" stroke="#c7d4c3" stroke-width="1"/>
              <line x1="26" y1="108" x2="334" y2="108" stroke="#c7d4c3" stroke-width="1"/>
              <polyline id="dashboard-sales-trend" fill="none" stroke="#3d8156" stroke-width="4" points="38,96 86,88 134,82 182,74 230,68 278,56 326,46"/>
              <polyline id="dashboard-expense-trend" fill="none" stroke="#d1914b" stroke-width="4" points="38,104 86,98 134,90 182,84 230,82 278,76 326,70"/>
              <text x="34" y="123" font-size="10" fill="#64796b">一</text>
              <text x="82" y="123" font-size="10" fill="#64796b">二</text>
              <text x="130" y="123" font-size="10" fill="#64796b">三</text>
              <text x="178" y="123" font-size="10" fill="#64796b">四</text>
              <text x="226" y="123" font-size="10" fill="#64796b">五</text>
              <text x="274" y="123" font-size="10" fill="#64796b">六</text>
              <text x="322" y="123" font-size="10" fill="#64796b">日</text>
            </svg>
            <div class="record-meta">绿色为销售，橙色为支出，按最近 7 天本地数据生成。</div>
          </section>

          <section class="panel">
            <h3>最近记录</h3>
            <div class="list" id="latest-records-list"></div>
          </section>
          <div id="scroll-sentinel" style="height:1px;"></div>
        </main>
      </div>
    </div>
  </div>
  <nav class="mobile-tabbar">
    <a class="active" href="dashboard.html"><strong>首页</strong>概览</a>
    <a href="sales.html"><strong>销售</strong>记账</a>
    <a href="expenses.html"><strong>支出</strong>登记</a>
    <a href="analytics.html"><strong>统计</strong>分析</a>
  </nav>

  <script src="data.js"></script>
  <script>
    function buildLastSevenDaysData() {
      const sales = OrchidBookkeeping.getSalesRecords();
      const expenses = OrchidBookkeeping.getExpenseRecords();
      const days = [];
      for (let i = 6; i >= 0; i -= 1) {
        const day = new Date();
        day.setDate(day.getDate() - i);
        const dayKey = OrchidBookkeeping.toDateKey(day);
        const salesTotal = sales
          .filter((item) => item.date === dayKey)
          .reduce((sum, item) => sum + item.totalAmount, 0);
        const expenseTotal = expenses
          .filter((item) => item.date === dayKey)
          .reduce((sum, item) => sum + item.amount, 0);
        days.push({ dayKey, salesTotal, expenseTotal });
      }
      return days;
    }

    function buildPolylinePoints(values, minY, maxY) {
      const maxValue = Math.max(...values, 1);
      const stepX = 48;
      return values.map((value, index) => {
        const x = 38 + index * stepX;
        const y = maxY - (value / maxValue) * (maxY - minY);
        return `${x},${y}`;
      }).join(" ");
    }

    let latestExpanded = false;

    function renderDashboard() {
      const todaySummary = OrchidBookkeeping.getTodaySummary();
      const weekSummary = OrchidBookkeeping.getRangeSummary("week");
      const monthSummary = OrchidBookkeeping.getRangeSummary("month");
      const allSales = OrchidBookkeeping.getSalesRecords();
      const allExpenses = OrchidBookkeeping.getExpenseRecords();
      const days = buildLastSevenDaysData();
      const today = OrchidBookkeeping.toDateKey(new Date());

      document.getElementById("dashboard-date-label").textContent = `${today} 今日汇总`;
      document.getElementById("dashboard-count-label").textContent = `今天已记账 ${todaySummary.salesCount + todaySummary.expenseCount} 笔`;
      document.getElementById("today-profit").textContent = OrchidBookkeeping.formatCurrencyPrecise(todaySummary.profitTotal);
      document.getElementById("today-profit-detail").textContent = `今日利润 = 销售 ${OrchidBookkeeping.formatCurrencyPrecise(todaySummary.salesTotal)} - 支出 ${OrchidBookkeeping.formatCurrencyPrecise(todaySummary.expenseTotal)}`;

      document.getElementById("today-summary-inline").innerHTML = `
        <div class="summary-chip">
          <strong>${OrchidBookkeeping.formatCurrencyPrecise(todaySummary.salesTotal)}</strong>
          <span>今日销售额</span>
        </div>
        <div class="summary-chip">
          <strong>${OrchidBookkeeping.formatCurrencyPrecise(todaySummary.expenseTotal)}</strong>
          <span>今日支出</span>
        </div>
        <div class="summary-chip">
          <strong>${todaySummary.salesCount} 笔</strong>
          <span>销售记录</span>
        </div>
        <div class="summary-chip">
          <strong>${todaySummary.expenseCount} 笔</strong>
          <span>支出记录</span>
        </div>
      `;

      document.getElementById("dashboard-shortcuts").innerHTML = `
        <div class="mobile-shortcut"><strong>${todaySummary.salesCount}</strong>今日销售</div>
        <div class="mobile-shortcut"><strong>${todaySummary.expenseCount}</strong>今日支出</div>
        <div class="mobile-shortcut"><strong>${OrchidBookkeeping.formatCurrencyPrecise(weekSummary.profitTotal).replace("¥ ", "¥")}</strong>本周利润</div>
        <div class="mobile-shortcut"><strong>${OrchidBookkeeping.formatCurrencyPrecise(monthSummary.salesTotal).replace("¥ ", "¥")}</strong>本月汇总</div>
      `;

      // 今日销售详情
      const todaySales = allSales.filter((s) => s.date === today);
      const gradeBreakdown = {};
      todaySales.forEach((s) => {
        (s.gradeItems || []).forEach((g) => {
          if (!gradeBreakdown[g.gradeLabel]) gradeBreakdown[g.gradeLabel] = { qty: 0, amount: 0 };
          gradeBreakdown[g.gradeLabel].qty += g.quantity;
          gradeBreakdown[g.gradeLabel].amount += g.totalAmount;
        });
      });
      const gradeLines = Object.keys(gradeBreakdown).length
        ? Object.entries(gradeBreakdown).map(([label, d]) => `${label} ${d.qty}株 ${OrchidBookkeeping.formatCurrencyPrecise(d.amount)}`).join("、")
        : "暂无";

      // 今日支出详情
      const todayExpenses = allExpenses.filter((e) => e.date === today);
      const typeBreakdown = {};
      todayExpenses.forEach((e) => {
        const t = e.expenseType || "其他";
        typeBreakdown[t] = (typeBreakdown[t] || 0) + e.amount;
      });
      const typeLines = Object.keys(typeBreakdown).length
        ? Object.entries(typeBreakdown).map(([t, a]) => `${t} ${OrchidBookkeeping.formatCurrencyPrecise(a)}`).join("、")
        : "暂无";

      // 本周品类汇总
      const weekSales = weekSummary.sales;
      const weekGradeTotals = {};
      weekSales.forEach((s) => {
        (s.gradeItems || []).forEach((g) => {
          weekGradeTotals[g.gradeLabel] = (weekGradeTotals[g.gradeLabel] || 0) + g.quantity;
        });
      });
      const weekGradeLine = Object.keys(weekGradeTotals).length
        ? Object.entries(weekGradeTotals).map(([l, q]) => `${l} ${q}株`).join("、")
        : "暂无";

      // 本月支出类型
      const monthExpenses = monthSummary.expenses;
      const monthTypeTotals = {};
      monthExpenses.forEach((e) => {
        const t = e.expenseType || "其他";
        monthTypeTotals[t] = (monthTypeTotals[t] || 0) + e.amount;
      });
      const monthTypeLine = Object.keys(monthTypeTotals).length
        ? Object.entries(monthTypeTotals).map(([t, a]) => `${t} ${OrchidBookkeeping.formatCurrencyPrecise(a)}`).join("、")
        : "暂无";

      document.getElementById("dashboard-quick-grid").innerHTML = `
        <a class="record-card" href="sales.html" style="text-decoration:none;color:inherit;">
          <div class="record-head">
            <div class="record-title">今日销售记录</div>
            <div class="record-amount">${todaySummary.salesCount} 笔</div>
          </div>
          <div class="record-meta">今日销售合计 ${OrchidBookkeeping.formatCurrencyPrecise(todaySummary.salesTotal)}。</div>
          <div class="record-meta" style="margin-top:4px;color:#3d8156;">${gradeLines}</div>
        </a>
        <a class="record-card" href="expenses.html" style="text-decoration:none;color:inherit;">
          <div class="record-head">
            <div class="record-title">今日支出记录</div>
            <div class="record-amount">${todaySummary.expenseCount} 笔</div>
          </div>
          <div class="record-meta">今日支出合计 ${OrchidBookkeeping.formatCurrencyPrecise(todaySummary.expenseTotal)}。</div>
          <div class="record-meta" style="margin-top:4px;color:#d1914b;">${typeLines}</div>
        </a>
        <a class="record-card" href="sales.html" style="text-decoration:none;color:inherit;">
          <div class="record-head">
            <div class="record-title">本周销售汇总</div>
            <div class="record-amount">${OrchidBookkeeping.formatCurrencyPrecise(weekSummary.salesTotal)}</div>
          </div>
          <div class="record-meta">利润 ${OrchidBookkeeping.formatCurrencyPrecise(weekSummary.profitTotal)} · ${weekSummary.label}</div>
          <div class="record-meta" style="margin-top:4px;color:#3d8156;">${weekGradeLine}</div>
        </a>
        <a class="record-card" href="analytics.html" style="text-decoration:none;color:inherit;">
          <div class="record-head">
            <div class="record-title">本月汇总</div>
            <div class="record-amount">${OrchidBookkeeping.formatCurrencyPrecise(monthSummary.salesTotal)}</div>
          </div>
          <div class="record-meta">利润 ${OrchidBookkeeping.formatCurrencyPrecise(monthSummary.profitTotal)} · ${monthSummary.label}</div>
          <div class="record-meta" style="margin-top:4px;color:#d1914b;">${monthTypeLine}</div>
        </a>
      `;

      document.getElementById("dashboard-sales-trend").setAttribute("points", buildPolylinePoints(days.map((item) => item.salesTotal), 26, 98));
      document.getElementById("dashboard-expense-trend").setAttribute("points", buildPolylinePoints(days.map((item) => item.expenseTotal), 34, 104));

      // 最近记录 - 展开/收纳
      renderLatestRecords(allSales, allExpenses);
    }

    function renderLatestRecords(allSales, allExpenses) {
      const container = document.getElementById("latest-records-list");
      const allRecords = [
        ...allSales.map((s) => ({
          type: "sale",
          title: `${s.customer || "客户"} 销售`,
          amount: s.totalAmount,
          date: s.date,
          meta: `${s.totalQuantity} 株 · ${s.gradeItems.map((g) => g.gradeLabel).join("、")}`,
          createdAt: s.createdAt
        })),
        ...allExpenses.map((e) => ({
          type: "expense",
          title: e.expenseType || "支出",
          amount: e.amount,
          date: e.date,
          meta: `${e.paymentMethod || ""} · ${e.note || ""}`,
          createdAt: e.createdAt
        }))
      ].sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));

      if (!allRecords.length) {
        container.innerHTML = '<div class="record-meta">还没有任何记录。</div>';
        return;
      }

      const displayRecords = latestExpanded ? allRecords : allRecords.slice(0, 3);
      const toggleText = latestExpanded ? "收起" : `展开全部 ${allRecords.length} 条`;

      container.innerHTML = displayRecords.map((record) => `
        <div class="record-card">
          <div class="record-head">
            <div class="record-title">${record.title}</div>
            <div class="record-amount">${OrchidBookkeeping.formatCurrencyPrecise(record.amount)}</div>
          </div>
          <div class="record-meta">${record.date} · ${record.meta}</div>
        </div>
      `).join("") + (allRecords.length > 3 ? `
        <button class="btn" type="button" id="latest-toggle-btn" style="width:100%;margin-top:8px;">${toggleText}</button>
      ` : "");

      const toggleBtn = document.getElementById("latest-toggle-btn");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          latestExpanded = !latestExpanded;
          renderLatestRecords(OrchidBookkeeping.getSalesRecords(), OrchidBookkeeping.getExpenseRecords());
        });
      }
    }

    renderDashboard();

    const tabbar = document.querySelector(".mobile-tabbar");
    const sentinel = document.getElementById("scroll-sentinel");
    const scrollObserver = new IntersectionObserver((entries) => {
      tabbar.classList.toggle("visible", entries[0].isIntersecting);
    }, { threshold: 0 });
    scrollObserver.observe(sentinel);
  </script>
</body>
</html>
